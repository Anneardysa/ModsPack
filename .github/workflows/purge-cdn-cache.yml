name: Purge CDN Cache

on:
   push:
      branches:
         - main
      paths:
         - "Assets/heroes.json"
         - "Assets/set_update.json"
         - "config/misc_config.json"
         - "config/**"
   workflow_dispatch:
      inputs:
         paths:
            description: "Comma-separated CDN paths to purge (e.g., Assets/heroes.json,config/misc_config.json)"
            required: false
            type: string

jobs:
   purge-cache:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout repository
           uses: actions/checkout@v4
           with:
              fetch-depth: 2

         - name: Detect changed files
           id: changes
           run: |
              if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                # Manual trigger: use inputs or default to key files
                if [ -n "${{ github.event.inputs.paths }}" ]; then
                  echo "paths=${{ github.event.inputs.paths }}" >> $GITHUB_OUTPUT
                else
                  echo "paths=Assets/heroes.json,Assets/set_update.json,config/misc_config.json" >> $GITHUB_OUTPUT
                fi
              else
                # Push trigger: detect from changed files (checkout provides git history)
                CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
                PATHS=""
                if echo "$CHANGED" | grep -q "Assets/heroes.json"; then
                  PATHS="${PATHS}Assets/heroes.json,"
                fi
                if echo "$CHANGED" | grep -q "Assets/set_update.json"; then
                  PATHS="${PATHS}Assets/set_update.json,"
                fi
                if echo "$CHANGED" | grep -q "config/"; then
                  PATHS="${PATHS}config/misc_config.json,"
                fi
                # Trim trailing comma
                PATHS="${PATHS%,}"

                # Safety net: if detection failed but workflow triggered, purge key files
                if [ -z "$PATHS" ]; then
                  echo "⚠️  Change detection returned empty, purging all key files as safety net"
                  PATHS="Assets/heroes.json,Assets/set_update.json,config/misc_config.json"
                fi

                echo "paths=$PATHS" >> $GITHUB_OUTPUT
              fi

         - name: Purge jsDelivr CDN cache
           if: steps.changes.outputs.paths != ''
           run: |
              echo "🔄 Purging jsDelivr CDN cache..."
              IFS=',' read -ra FILES <<< "${{ steps.changes.outputs.paths }}"
              FAILED=0
              for file in "${FILES[@]}"; do
                file=$(echo "$file" | xargs) # trim whitespace
                echo "  Purging: $file"
                RESPONSE=$(curl -s -w "\n%{http_code}" \
                  "https://purge.jsdelivr.net/gh/Anneardysa/ModsPack@main/${file}")
                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | head -n -1)
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "  ✅ Purged from jsDelivr: $file"
                else
                  echo "  ⚠️  jsDelivr purge returned $HTTP_CODE for: $file"
                  echo "  Response: $BODY"
                  FAILED=$((FAILED + 1))
                fi
              done

              if [ $FAILED -gt 0 ]; then
                echo "::warning::$FAILED file(s) failed to purge from jsDelivr"
              fi

         - name: Verify fresh content
           run: |
              echo "⏳ Waiting for CDN to refresh..."
              sleep 5
              echo "🔍 Verifying heroes.json is fresh..."
              HERO_COUNT=$(curl -s "https://cdn.jsdelivr.net/gh/Anneardysa/ModsPack@main/Assets/heroes.json" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "?")
              echo "  Heroes count from jsDelivr: $HERO_COUNT"

         - name: Summary
           run: |
              echo "## CDN Cache Purge Complete" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Files purged:**" >> $GITHUB_STEP_SUMMARY
              IFS=',' read -ra FILES <<< "${{ steps.changes.outputs.paths }}"
              for file in "${FILES[@]}"; do
                file=$(echo "$file" | xargs)
                echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "CDN will serve fresh content on next request." >> $GITHUB_STEP_SUMMARY
