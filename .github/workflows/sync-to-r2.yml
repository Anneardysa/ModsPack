name: Sync Assets to Cloudflare R2

on:
   push:
      paths:
         - "Assets/**"
         - "config/**"
         - "remote/**"
         - "dataset/**"
      branches:
         - main
   workflow_dispatch: # Allow manual trigger from GitHub UI

env:
   INSTALL_RCLONE_VERSION: v1.65.0

jobs:
   sync-to-r2:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4
           with:
              fetch-depth: 2 # Need parent commit for change detection

         - name: Install rclone
           run: |
              curl -O https://downloads.rclone.org/${INSTALL_RCLONE_VERSION}/rclone-${INSTALL_RCLONE_VERSION}-linux-amd64.zip
              unzip rclone-${INSTALL_RCLONE_VERSION}-linux-amd64.zip
              sudo mv rclone-${INSTALL_RCLONE_VERSION}-linux-amd64/rclone /usr/local/bin/
              rclone version

         - name: Configure rclone for R2
           run: |
              mkdir -p ~/.config/rclone
              cat > ~/.config/rclone/rclone.conf << EOF
              [r2]
              type = s3
              provider = Cloudflare
              access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
              secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
              endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
              acl = public-read
              EOF

         - name: Verify R2 connection
           run: |
              echo "Testing R2 connection..."
              rclone lsd r2:${{ secrets.R2_BUCKET_NAME }} || echo "Bucket may be empty or new"

         - name: Detect changed folders
           id: changes
           run: |
              # For workflow_dispatch or if git diff fails, sync all folders
              if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                echo "assets=true" >> $GITHUB_OUTPUT
                echo "config=true" >> $GITHUB_OUTPUT
                echo "remote=true" >> $GITHUB_OUTPUT
                echo "dataset=true" >> $GITHUB_OUTPUT
                echo "Manual trigger: syncing all folders"
                exit 0
              fi

              # Use git diff with fallback to sync all on failure
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "DIFF_FAILED")

              if [ "$CHANGED_FILES" == "DIFF_FAILED" ]; then
                echo "⚠️ Could not detect changes, syncing all folders"
                echo "assets=true" >> $GITHUB_OUTPUT
                echo "config=true" >> $GITHUB_OUTPUT
                echo "remote=true" >> $GITHUB_OUTPUT
                echo "dataset=true" >> $GITHUB_OUTPUT
                exit 0
              fi

              echo "Changed files:"
              echo "$CHANGED_FILES"

              # Default all to false
              SYNC_ASSETS=false
              SYNC_CONFIG=false
              SYNC_REMOTE=false
              SYNC_DATASET=false

              if echo "$CHANGED_FILES" | grep -q "^Assets/"; then
                SYNC_ASSETS=true
              fi
              if echo "$CHANGED_FILES" | grep -q "^config/"; then
                SYNC_CONFIG=true
              fi
              if echo "$CHANGED_FILES" | grep -q "^remote/"; then
                SYNC_REMOTE=true
              fi
              if echo "$CHANGED_FILES" | grep -q "^dataset/"; then
                SYNC_DATASET=true
              fi

              echo "assets=$SYNC_ASSETS" >> $GITHUB_OUTPUT
              echo "config=$SYNC_CONFIG" >> $GITHUB_OUTPUT
              echo "remote=$SYNC_REMOTE" >> $GITHUB_OUTPUT
              echo "dataset=$SYNC_DATASET" >> $GITHUB_OUTPUT
              echo "Sync plan: Assets=$SYNC_ASSETS, Config=$SYNC_CONFIG, Remote=$SYNC_REMOTE, Dataset=$SYNC_DATASET"

         - name: Sync Assets to R2
           if: steps.changes.outputs.assets == 'true'
           run: |
              echo "📦 Syncing Assets/ → R2..."
              rclone sync ./Assets r2:${{ secrets.R2_BUCKET_NAME }}/Assets \
                --progress \
                --transfers 8 \
                --checkers 16 \
                --fast-list \
                --stats 30s \
                -v
              echo "✅ Assets sync completed"

         - name: Sync config to R2
           if: steps.changes.outputs.config == 'true'
           run: |
              echo "📦 Syncing config/ → R2..."
              rclone sync ./config r2:${{ secrets.R2_BUCKET_NAME }}/config \
                --progress \
                --transfers 4 \
                --checkers 8 \
                --fast-list \
                -v
              echo "✅ Config sync completed"

         - name: Sync remote to R2
           if: steps.changes.outputs.remote == 'true'
           run: |
              echo "📦 Syncing remote/ → R2..."
              rclone sync ./remote r2:${{ secrets.R2_BUCKET_NAME }}/remote \
                --progress \
                --transfers 4 \
                --checkers 8 \
                --fast-list \
                -v
              echo "✅ Remote sync completed"

         - name: Sync dataset to R2
           if: steps.changes.outputs.dataset == 'true'
           run: |
              echo "📦 Syncing dataset/ → R2..."
              rclone sync ./dataset r2:${{ secrets.R2_BUCKET_NAME }}/dataset \
                --progress \
                --transfers 8 \
                --checkers 16 \
                --fast-list \
                --stats 30s \
                -v
              echo "✅ Dataset sync completed"

         - name: Generate sync summary
           run: |
              echo "## ✅ R2 Sync Complete" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Folders synced:" >> $GITHUB_STEP_SUMMARY

              if [ "${{ steps.changes.outputs.assets }}" == "true" ]; then
                echo "- ✅ **Assets/** → R2" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                rclone size r2:${{ secrets.R2_BUCKET_NAME }}/Assets 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Unable to get size" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              if [ "${{ steps.changes.outputs.config }}" == "true" ]; then
                echo "- ✅ **config/** → R2" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                rclone ls r2:${{ secrets.R2_BUCKET_NAME }}/config 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Unable to list" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              if [ "${{ steps.changes.outputs.remote }}" == "true" ]; then
                echo "- ✅ **remote/** → R2" >> $GITHUB_STEP_SUMMARY
              fi
              if [ "${{ steps.changes.outputs.dataset }}" == "true" ]; then
                echo "- ✅ **dataset/** → R2" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                rclone size r2:${{ secrets.R2_BUCKET_NAME }}/dataset 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Unable to get size" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi

         - name: Notify on failure
           if: failure()
           run: |
              echo "## ❌ R2 Sync Failed" >> $GITHUB_STEP_SUMMARY
              echo "Please check the logs above for details." >> $GITHUB_STEP_SUMMARY
